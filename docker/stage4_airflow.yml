name: nyc_stage4_airflow

services:
  airflow-postgres:
    image: postgres:16
    container_name: nyc_airflow_postgres
    restart: "no"
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    volumes:
      - ../data/airflow_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - nyc-data-net

  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: nyc_airflow_init
    group_add:
      - "125"
    depends_on:
      airflow-postgres:
        condition: service_healthy
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      DBT_PROFILES_DIR: /opt/airflow/dbt_project
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: admin12345
      _AIRFLOW_WWW_USER_USERNAME: admin
      _AIRFLOW_WWW_USER_PASSWORD: admin
      _AIRFLOW_WWW_USER_FIRSTNAME: Admin
      _AIRFLOW_WWW_USER_LASTNAME: User
      _AIRFLOW_WWW_USER_EMAIL: admin@example.com
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../dbt_project:/opt/airflow/dbt_project
      - ../scripts:/opt/airflow/scripts
      - /var/run/docker.sock:/var/run/docker.sock
    command: >
      bash -lc "
      airflow db migrate &&
      airflow users create
      --role Admin
      --username admin
      --password admin
      --firstname Admin
      --lastname User
      --email admin@example.com || true
      "
    networks:
      - nyc-data-net

  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: nyc_airflow_webserver
    restart: "no"
    group_add:
      - "125"
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    ports:
      - "8082:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      DBT_PROFILES_DIR: /opt/airflow/dbt_project
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: admin12345
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../dbt_project:/opt/airflow/dbt_project
      - ../scripts:/opt/airflow/scripts
      - /var/run/docker.sock:/var/run/docker.sock
    command: webserver
    networks:
      - nyc-data-net

  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    container_name: nyc_airflow_scheduler
    restart: "no"
    group_add:
      - "125"
    depends_on:
      airflow-postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "true"
      DBT_PROFILES_DIR: /opt/airflow/dbt_project
      S3_ACCESS_KEY: admin
      S3_SECRET_KEY: admin12345
    volumes:
      - ../airflow/dags:/opt/airflow/dags
      - ../airflow/logs:/opt/airflow/logs
      - ../dbt_project:/opt/airflow/dbt_project
      - ../scripts:/opt/airflow/scripts
      - /var/run/docker.sock:/var/run/docker.sock
    command: scheduler
    networks:
      - nyc-data-net

networks:
  nyc-data-net:
    name: nyc_data_net
    external: true
