name: nyc_stage1_s3_minio

# Этап 1 - S3-совместимое объектное хранилище (MinIO)
# Порты хоста смещены с 9000/9001, чтобы не конфликтовать с Portainer.

services:
  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: nyc_minio
    restart: "no"
    ports:
      - "9010:9000"
      - "9011:9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-admin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-admin12345}
    volumes:
      - ../data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - nyc-data-net
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 15s

networks:
  nyc-data-net:
    name: nyc_data_net
    external: true
